version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.2
  env_file:
    - ../config/.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: local_secret
    DB_HOST: timescaledb
    DB_PORT: 5432
    DB_NAME: wind_turbine_db
    DB_USER: postgres
    DB_PASSWORD: postgres
    KAFKA_BROKER: kafka:29092
  volumes:
    - ../dags:/opt/airflow/dags
    - ../logs:/opt/airflow/logs
  depends_on:
    - airflow-db

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: wind_zookeeper
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: wind_kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: wind_timescaledb
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: wind_turbine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql

  airflow-db:
    image: postgres:15
    container_name: wind_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    container_name: wind_airflow_init
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: wind_airflow_webserver
    command: webserver
    ports:
      - '8080:8080'
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: wind_airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  timescale_data:
  airflow_db_data:
